version: '3'

includes:

tasks:


  default:
    desc: Default
    cmds:
      - |
        echo "Home dir: {{.HOME}}"
        echo "Root dir: {{.ROOT_DIR}}"
        echo "Working dir: {{.USER_WORKING_DIR}}"
        echo "OS: {{OS}}"
        task --list
    silent: true

  assert:
    cmds:
      - for:
          var: REQUIRED_TOOLS
          split: ','
          as: TOOL
        cmd: |
          [ -n "$(which {{ .TOOL }})" ] || ( \
            echo "ERROR: `{{ .TOOL }}` not found" && exit 1; \
          )
    silent: true
    internal: true
    vars:
      REQUIRED_TOOLS: prek, nvim

  setup:
    deps: [assert]
    desc: Initialize prek
    cmds:
      - prek install

  update:
    deps: [assert]
    desc: Update prek hooks
    cmds:
      - prek auto-update
      - prek cache gc
      - prek validate-config

  run:
    deps: [assert]
    desc: Run prek for all files
    cmds:
      - prek run --color always --all-files
